name: Daily ETL

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  run-etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETL
        env:
          DO_DB_URL: ${{ secrets.DO_DB_URL }}
          TARGET_DB_URL: ${{ secrets.TARGET_DB_URL }}
        run: python etl.py
